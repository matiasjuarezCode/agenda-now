<style>
 * {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
}

.dashboard {
  display: flex;
  height: 100vh;
}

.sidebar {
  width: 200px;
  border-right: 1px solid #ccc;
  padding: 20px;
}

.sidebar ul {
  list-style: none;
  margin-top: 20px;
}

.sidebar li {
  padding: 10px 0;
  cursor: pointer;
}

.sidebar .active {
  font-weight: bold;
}

.content {
  flex: 1;
  padding: 30px;
}

h1 {
  margin-bottom: 20px;
}

.form-container {
  border: 1px solid #ccc;
  padding: 20px;
  margin-bottom: 30px;
  max-width: 500px;
}

.form-row {
  display: flex;
  flex-direction: column;
  margin-bottom: 15px;
}

.form-row label {
  margin-bottom: 5px;
}

.form-row input {
  padding: 8px;
  border: 1px solid #ccc;
}

.radio-group {
  display: flex;
  gap: 15px;
}

button {
  padding: 8px 12px;
  border: 1px solid #333;
  background: none;
  cursor: pointer;
}

.grid-container table {
  width: 100%;
  border-collapse: collapse;
}

.grid-container th,
.grid-container td {
  border: 1px solid #ccc;
  padding: 10px;
  text-align: left;
}
</style>

<div class="dashboard">

  <aside class="sidebar">
    <h2>Dashboard</h2>
    <ul>
      <li class="active">ABMs</li>
    </ul>
  </aside>

  <main class="content">

    <h1>Empresas</h1>

    <div class="form-container">

      <div class="form-row">
        <label>Nombre Empresa</label>
        <input type="text" placeholder="Ingrese nombre" required />
      </div>

      <div class="form-row">
        <label>Cantidad de empleados</label>
        <input type="number" min="1" />
      </div>

      <div class="form-row">
        <label>Tipo Empresa</label>

        <div class="radio-group">
          <label>
            <input type="radio" name="tipoEmpresa" /> Startup
          </label>

          <label>
            <input type="radio" name="tipoEmpresa" /> Pyme
          </label>

          <label>
            <input type="radio" name="tipoEmpresa" /> Corporación
          </label>
        </div>
      </div>

      <div class="form-row">
        <button>Agregar</button>
      </div>

    </div>


    <div class="grid-container">

      <table>
        <thead>
          <tr>
            <th>Empresa</th>
            <th>Empleados</th>
            <th>Tipo</th>
            <th>Acciones</th>
          </tr>
        </thead>

        <tbody>

          <tr>
            <td>Google</td>
            <td>10000</td>
            <td>Corporación</td>
            <td>
              <button>Editar</button>
              <button>Eliminar</button>
            </td>
          </tr>

        </tbody>
      </table>

    </div>

  </main>

</div>
